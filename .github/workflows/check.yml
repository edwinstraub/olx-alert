name: OLX motorcycle alert

on:
  schedule:
    # Single source of truth for check frequency. Default: every 15 minutes.
    # Note: GitHub Actions cron has ~5-minute minimum granularity and may be
    # delayed several minutes under load — acceptable for marketplace polling.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Serialize runs so two jobs never race on state/seen.json.
concurrency:
  group: olx-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new listings
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python main.py

      - name: Commit updated state
        # Only after a successful run (the previous step did not fail). State is
        # only ever advanced on success, so a failed run leaves nothing to commit.
        if: success()
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore: update seen listings state"
            git push
          else
            echo "No state change to commit."
          fi
